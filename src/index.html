<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EERobot - 实时时钟</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            animation: fadeIn 1s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .time {
            font-size: 5rem;
            font-weight: 300;
            letter-spacing: 8px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 1rem 0;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.85; } }
        .date {
            font-size: 1.4rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 0.5rem;
        }
        .weekday {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.5);
        }
        .footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.3);
        }
        .footer a { color: #764ba2; text-decoration: none; }
        .countdown-section {
            margin: 1.5rem 0;
            padding: 1.5rem;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .countdown-title {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            margin-bottom: 0.8rem;
            letter-spacing: 2px;
        }
        .countdown-grid {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }
        .countdown-item {
            text-align: center;
            min-width: 60px;
        }
        .countdown-value {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .countdown-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.2rem;
        }
        @media (max-width: 600px) {
            .time { font-size: 2.5rem; letter-spacing: 4px; }
            .container { padding: 2rem; margin: 1rem; }
            .countdown-value { font-size: 1.5rem; }
            .countdown-grid { gap: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🕐 EERobot 实时时钟</h2>
        <div class="time" id="time">--:--:--</div>
        <div class="date" id="date">----年--月--日</div>
        <div class="weekday" id="weekday">星期-</div>
        <div class="countdown-section">
            <div class="countdown-title">⏳ 距离 2026年7月1日 还有</div>
            <div class="countdown-grid">
                <div class="countdown-item">
                    <div class="countdown-value" id="cd-days">0</div>
                    <div class="countdown-label">天</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="cd-hours">0</div>
                    <div class="countdown-label">时</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="cd-minutes">0</div>
                    <div class="countdown-label">分</div>
                </div>
                <div class="countdown-item">
                    <div class="countdown-value" id="cd-seconds">0</div>
                    <div class="countdown-label">秒</div>
                </div>
            </div>
        </div>
        <div class="footer">
            Powered by <a href="https://github.com/1255115889-bot/eerobot">EERobot</a>
        </div>
    </div>
    <script>
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('zh-CN', { hour12: false });
            const date = now.toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' });
            const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
            const weekday = weekdays[now.getDay()];
            document.getElementById('time').textContent = time;
            document.getElementById('date').textContent = date;
            document.getElementById('weekday').textContent = weekday;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // 倒计时：距离 2026年7月1日
        const targetDate = new Date('2026-07-01T00:00:00+08:00');
        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;
            if (diff <= 0) {
                document.getElementById('cd-days').textContent = '0';
                document.getElementById('cd-hours').textContent = '0';
                document.getElementById('cd-minutes').textContent = '0';
                document.getElementById('cd-seconds').textContent = '0';
                return;
            }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('cd-days').textContent = days;
            document.getElementById('cd-hours').textContent = hours;
            document.getElementById('cd-minutes').textContent = minutes;
            document.getElementById('cd-seconds').textContent = seconds;
        }
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
